name: CI Validation Gate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: framehouse_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Initialize Database Schema
        run: npm run payload migrate
        env:
          DATABASE_URI: postgres://postgres:password@localhost:5432/framehouse_ci
          PAYLOAD_SECRET: ci_secret

      - name: Lint Check
        run: npm run lint

      - name: Production Build Check
        run: npm run build
        env:
          DATABASE_URI: postgres://postgres:password@localhost:5432/framehouse_ci
          PAYLOAD_SECRET: ci_secret
          NEXT_PUBLIC_SERVER_URL: http://localhost:3000

  docker-build:
    runs-on: ubuntu-latest
    needs: validate
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push (Dry Run)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: framehouse-hub:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
